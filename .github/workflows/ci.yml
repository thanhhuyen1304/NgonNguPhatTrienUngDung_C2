name: CI

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'ShipperMobileApp/**'
  pull_request:
    paths-ignore:
      - 'ShipperMobileApp/**'
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend Build And Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

  backend:
    name: Backend Install And Syntax Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify backend entrypoint
        run: node --check server.js

      - name: Verify backend source syntax
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const {spawnSync}=require('child_process'); const root=process.cwd(); const skip=new Set(['node_modules','.git']); const files=[]; function walk(dir){ for (const entry of fs.readdirSync(dir,{withFileTypes:true})) { if (skip.has(entry.name)) continue; const full=path.join(dir, entry.name); if (entry.isDirectory()) walk(full); else if (entry.isFile() && full.endsWith('.js')) files.push(full); } } walk(root); const failed=[]; for (const file of files) { const result=spawnSync(process.execPath,['--check',file],{stdio:'inherit'}); if (result.status !== 0) failed.push(path.relative(root,file)); } if (failed.length) { console.error('Syntax check failed for:', failed.join(', ')); process.exit(1); } console.log(`Checked ${files.length} backend JavaScript files.`);"
